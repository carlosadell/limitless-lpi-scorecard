<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#070709"/>

  <g font-family="'Oswald', 'Arial Black', sans-serif" font-weight="700" text-transform="uppercase">

    <!-- CENTER HERO WORDS -->
    <text x="960" y="480" text-anchor="middle" font-size="140" fill="#FF3333" opacity="0.07" letter-spacing="20">LIMITLESS</text>
    <text x="960" y="620" text-anchor="middle" font-size="90" fill="#FFFFFF" opacity="0.04" letter-spacing="12">PERFORMANCE</text>

    <!-- LARGE ACCENT WORDS -->
    <text x="960" y="340" text-anchor="middle" font-size="55" fill="#FF3333" opacity="0.055" letter-spacing="8">CONVERSION</text>
    <text x="960" y="740" text-anchor="middle" font-size="60" fill="#FFFFFF" opacity="0.035" letter-spacing="10">INDICATORS</text>
    <text x="480" y="540" text-anchor="middle" font-size="65" fill="#FF3333" opacity="0.05" letter-spacing="6">GROWTH</text>
    <text x="1450" y="520" text-anchor="middle" font-size="60" fill="#FF3333" opacity="0.05" letter-spacing="6">RESULTS</text>

    <!-- MEDIUM WORDS - LEFT SIDE -->
    <text x="180" y="180" text-anchor="start" font-size="38" fill="#FFFFFF" opacity="0.03" letter-spacing="5">STRATEGY</text>
    <text x="120" y="300" text-anchor="start" font-size="45" fill="#FF3333" opacity="0.045" letter-spacing="4">CLARITY</text>
    <text x="80" y="420" text-anchor="start" font-size="32" fill="#FFFFFF" opacity="0.03" letter-spacing="6">SCHEDULE</text>
    <text x="200" y="660" text-anchor="start" font-size="40" fill="#FF3333" opacity="0.04" letter-spacing="5">CONVICTION</text>
    <text x="140" y="780" text-anchor="start" font-size="34" fill="#FFFFFF" opacity="0.025" letter-spacing="4">PRODUCTION</text>
    <text x="100" y="900" text-anchor="start" font-size="42" fill="#FF3333" opacity="0.04" letter-spacing="3">NUMBERS</text>
    <text x="250" y="1000" text-anchor="start" font-size="30" fill="#FFFFFF" opacity="0.025" letter-spacing="5">PROCESS</text>

    <!-- MEDIUM WORDS - RIGHT SIDE -->
    <text x="1800" y="160" text-anchor="end" font-size="36" fill="#FF3333" opacity="0.04" letter-spacing="5">COACHING</text>
    <text x="1750" y="290" text-anchor="end" font-size="42" fill="#FFFFFF" opacity="0.03" letter-spacing="4">DECISIONS</text>
    <text x="1820" y="410" text-anchor="end" font-size="34" fill="#FF3333" opacity="0.04" letter-spacing="6">HYGIENE</text>
    <text x="1700" y="660" text-anchor="end" font-size="38" fill="#FFFFFF" opacity="0.03" letter-spacing="4">COLLECTIONS</text>
    <text x="1780" y="780" text-anchor="end" font-size="44" fill="#FF3333" opacity="0.045" letter-spacing="3">SCALE</text>
    <text x="1820" y="880" text-anchor="end" font-size="30" fill="#FFFFFF" opacity="0.025" letter-spacing="5">OVERHEAD</text>
    <text x="1700" y="990" text-anchor="end" font-size="36" fill="#FF3333" opacity="0.035" letter-spacing="4">PROFIT</text>

    <!-- SMALLER SCATTERED WORDS -->
    <text x="400" y="140" text-anchor="middle" font-size="26" fill="#FFFFFF" opacity="0.02" letter-spacing="4">IMPLEMENT</text>
    <text x="700" y="200" text-anchor="middle" font-size="30" fill="#FF3333" opacity="0.035" letter-spacing="3">DATA</text>
    <text x="1200" y="180" text-anchor="middle" font-size="28" fill="#FFFFFF" opacity="0.025" letter-spacing="5">TEAM</text>
    <text x="1500" y="240" text-anchor="middle" font-size="24" fill="#FF3333" opacity="0.03" letter-spacing="4">MEASURE</text>

    <text x="350" y="850" text-anchor="middle" font-size="28" fill="#FF3333" opacity="0.03" letter-spacing="3">ACHIEVE</text>
    <text x="650" y="900" text-anchor="middle" font-size="24" fill="#FFFFFF" opacity="0.02" letter-spacing="5">OPTIMIZE</text>
    <text x="1100" y="870" text-anchor="middle" font-size="26" fill="#FF3333" opacity="0.03" letter-spacing="4">REVENUE</text>
    <text x="1350" y="940" text-anchor="middle" font-size="22" fill="#FFFFFF" opacity="0.02" letter-spacing="5">OPERATIONS</text>

    <text x="580" y="760" text-anchor="middle" font-size="22" fill="#FFFFFF" opacity="0.02" letter-spacing="3">ACCEPTANCE</text>
    <text x="1300" y="760" text-anchor="middle" font-size="24" fill="#FF3333" opacity="0.025" letter-spacing="4">LEVERAGE</text>

    <!-- TINY FILL WORDS -->
    <text x="300" y="480" text-anchor="middle" font-size="18" fill="#FFFFFF" opacity="0.015" letter-spacing="3">REACTIVATION</text>
    <text x="1600" y="480" text-anchor="middle" font-size="20" fill="#FFFFFF" opacity="0.015" letter-spacing="3">CAPACITY</text>
    <text x="750" y="820" text-anchor="middle" font-size="18" fill="#FF3333" opacity="0.02" letter-spacing="4">FFS</text>
    <text x="1150" y="280" text-anchor="middle" font-size="20" fill="#FF3333" opacity="0.025" letter-spacing="3">FREEDOM</text>
    <text x="500" y="280" text-anchor="middle" font-size="22" fill="#FFFFFF" opacity="0.02" letter-spacing="3">VELOCITY</text>
    <text x="800" y="680" text-anchor="middle" font-size="20" fill="#FF3333" opacity="0.02" letter-spacing="4">ENERGY</text>
    <text x="1100" y="680" text-anchor="middle" font-size="18" fill="#FFFFFF" opacity="0.015" letter-spacing="3">REFERRAL</text>
    <text x="400" y="380" text-anchor="middle" font-size="19" fill="#FF3333" opacity="0.02" letter-spacing="3">DENTAL</text>
    <text x="1550" y="370" text-anchor="middle" font-size="19" fill="#FFFFFF" opacity="0.015" letter-spacing="3">PRACTICE</text>
    <text x="680" y="400" text-anchor="middle" font-size="16" fill="#FFFFFF" opacity="0.015" letter-spacing="3">RETENTION</text>
    <text x="1250" y="420" text-anchor="middle" font-size="17" fill="#FF3333" opacity="0.02" letter-spacing="3">EFFICIENCY</text>

  </g>
</svg>
